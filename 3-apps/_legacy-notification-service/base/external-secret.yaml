apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: legacy-maliev-notification-service
  labels:
    app.kubernetes.io/name: legacy-maliev-notification-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: legacy-maliev-notification-service
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        Brevo__ApiKey: "{{ .brevoApiKey }}"
        Jwt__PublicKey: "{{ .jwtPublicKey }}"
        Jwt__Issuer: "{{ .jwtIssuer }}"
        Jwt__Audience: "{{ .jwtAudience }}"
  data:
    - secretKey: brevoApiKey
      remoteRef:
        key: maliev-legacy-secrets
        property: legacy-notification-brevo-api-key
    - secretKey: jwtPublicKey
      remoteRef:
        key: maliev-legacy-secrets
        property: legacy-jwt-public-key
    - secretKey: jwtIssuer
      remoteRef:
        key: maliev-legacy-secrets
        property: legacy-jwt-issuer
    - secretKey: jwtAudience
      remoteRef:
        key: maliev-legacy-secrets
        property: legacy-jwt-audience
