apiVersion: apps/v1
kind: Deployment
metadata:
  name: legacy-maliev-country-service
  labels:
    app.kubernetes.io/name: legacy-maliev-country-service
    app.kubernetes.io/part-of: maliev-legacy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: legacy-maliev-country-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: legacy-maliev-country-service
        app.kubernetes.io/part-of: maliev-legacy
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: country-service
          image: asia-southeast1-docker.pkg.dev/maliev-website/maliev-website-artifact-prod/legacy-maliev-country-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_HTTP_PORTS
              value: "8080"
          envFrom:
            - secretRef:
                name: legacy-maliev-country-service
          securityContext:
            runAsNonRoot: true
            runAsUser: 1654
            runAsGroup: 1654
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 200m
              memory: 192Mi
          livenessProbe:
            httpGet:
              path: /countries/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /countries/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /countries/liveness
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
      terminationGracePeriodSeconds: 30
