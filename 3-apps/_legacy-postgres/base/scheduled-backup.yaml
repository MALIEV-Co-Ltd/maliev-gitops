apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: legacy-postgres-daily-backup
  labels:
    app.kubernetes.io/name: legacy-postgres
spec:
  schedule: "0 0 19 * * *"
  backupOwnerReference: self
  immediate: true
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  cluster:
    name: legacy-postgres-main
