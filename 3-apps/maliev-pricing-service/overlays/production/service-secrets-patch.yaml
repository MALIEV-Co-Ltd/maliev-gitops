apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata: {name: maliev-pricing-service-secrets}
spec:
  target: {name: maliev-pricing-service-secrets}
  data:
    - {secretKey: Jwt__PublicKey, remoteRef: {key: maliev-prod-shared-config, property: Jwt__PublicKey}}
    - {secretKey: Jwt__Issuer, remoteRef: {key: maliev-prod-shared-config, property: Jwt__Issuer}}
    - {secretKey: Jwt__Audience, remoteRef: {key: maliev-prod-shared-config, property: Jwt__Audience}}
    - secretKey: ServiceAuthentication__ClientSecret
      remoteRef:
        key: maliev-prod-pricing-service-config
        property: ServiceAuthentication__ClientSecret
    - secretKey: ConnectionStrings__PricingDbContext
      remoteRef:
        key: maliev-prod-pricing-service-config
        property: ConnectionStrings__PricingDbContext
    - {secretKey: ConnectionStrings__rabbitmq, remoteRef: {key: maliev-prod-shared-config, property: ConnectionStrings__rabbitmq}}
    - {secretKey: ConnectionStrings__redis, remoteRef: {key: maliev-prod-shared-config, property: ConnectionStrings__redis}}
    - {secretKey: CORS__AllowedOrigins, remoteRef: {key: maliev-prod-shared-config, property: CORS__AllowedOrigins}}
