apiVersion: apps/v1
kind: Deployment
metadata:
  name: maliev-accounting-service
  labels:
    app: maliev-accounting-service
spec:
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: maliev-accounting-service
  template:
    metadata:
      labels:
        app: maliev-accounting-service
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: maliev-accounting-service
          image: asia-southeast1-docker.pkg.dev/maliev-website/maliev-website-artifact/maliev-accounting-service:latest
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 3000
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "10m"
              memory: "96Mi"
            limits:
              cpu: "25m"
              memory: "128Mi"
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /accounting/liveness
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /accounting/liveness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /accounting/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          env:
            - name: Jwt__PublicKey
              valueFrom:
                secretKeyRef:
                  name: maliev-accounting-service-secrets
                  key: Jwt__PublicKey
            - name: Jwt__Issuer
              valueFrom:
                secretKeyRef:
                  name: maliev-accounting-service-secrets
                  key: Jwt__Issuer
            - name: Jwt__Audience
              valueFrom:
                secretKeyRef:
                  name: maliev-accounting-service-secrets
                  key: Jwt__Audience
            - name: ServiceAuthentication__ClientId
              value: "service-accounting-service"
            - name: ServiceAuthentication__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: maliev-accounting-service-secrets
                  key: ServiceAuthentication__ClientSecret
            - name: Services__AuthService__BaseUrl
              value: "https://api.maliev.com"
            - name: Services__IAMService__BaseUrl
              value: "https://api.maliev.com"
            - name: ConnectionStrings__AccountingDbContext
              valueFrom:
                secretKeyRef:
                  name: maliev-accounting-service-secrets
                  key: ConnectionStrings__AccountingDbContext
            - name: ConnectionStrings__rabbitmq
              valueFrom:
                secretKeyRef:
                  name: maliev-accounting-service-secrets
                  key: ConnectionStrings__rabbitmq
            - name: ConnectionStrings__redis
              valueFrom:
                secretKeyRef:
                  name: maliev-accounting-service-secrets
                  key: ConnectionStrings__redis
            - name: CORS__AllowedOrigins
              valueFrom:
                secretKeyRef:
                  name: maliev-accounting-service-secrets
                  key: CORS__AllowedOrigins
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
