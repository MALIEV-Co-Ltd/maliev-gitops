apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: maliev-quote-engine-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: maliev-quote-engine
  minReplicas: 1
  # QuoteAgentSessionStore still has process-local action state. Keep one pod
  # until cross-pod session/action persistence tests prove horizontal safety.
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
