apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: legacy-redis
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: legacy-redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: legacy-maliev-country-service
      ports:
        - protocol: TCP
          port: 6379
  egress: []
