apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: maliev-staging
  namespace: argocd
spec:
  description: "Staging environment applications"
  sourceRepos:
    - "https://github.com/MALIEV-Co-Ltd/maliev-gitops.git"
  destinations:
    - namespace: maliev-staging
      server: https://kubernetes.default.svc
  permitOnlyProjectScopedClusters: true
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
