apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: legacy-maliev-auth-service-cutover
  namespace: argocd
  labels:
    app.kubernetes.io/name: legacy-maliev-auth-service
    app.kubernetes.io/part-of: legacy-maliev-cutover
    app.kubernetes.io/environment: validation
spec:
  project: default
  source:
    repoURL: https://github.com/MALIEV-Co-Ltd/maliev-gitops.git
    targetRevision: main
    path: 3-apps/_legacy-cutover/auth
  destination:
    server: https://kubernetes.default.svc
    namespace: maliev-legacy
